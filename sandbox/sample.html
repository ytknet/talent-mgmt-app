<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>砂場 Sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 60%, #f5deb3 60%, #f5deb3 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      overflow-x: hidden;
    }

    /* 雲 */
    .clouds {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 55%;
      pointer-events: none;
      z-index: 0;
    }
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.85;
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud:nth-child(1) { width: 120px; height: 40px; top: 15%; left: -140px; animation-duration: 28s; animation-delay: 0s; }
    .cloud:nth-child(1)::before { width: 60px; height: 60px; top: -30px; left: 15px; }
    .cloud:nth-child(1)::after  { width: 40px; height: 40px; top: -18px; left: 55px; }
    .cloud:nth-child(2) { width: 90px; height: 30px; top: 30%; left: -110px; animation-duration: 38s; animation-delay: 8s; }
    .cloud:nth-child(2)::before { width: 45px; height: 45px; top: -22px; left: 10px; }
    .cloud:nth-child(2)::after  { width: 30px; height: 30px; top: -12px; left: 45px; }
    .cloud:nth-child(3) { width: 150px; height: 50px; top: 8%; left: -170px; animation-duration: 22s; animation-delay: 14s; }
    .cloud:nth-child(3)::before { width: 70px; height: 70px; top: -35px; left: 20px; }
    .cloud:nth-child(3)::after  { width: 50px; height: 50px; top: -22px; left: 75px; }

    @keyframes drift {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(100vw + 200px)); }
    }

    /* メインコンテンツ */
    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      color: #5c3d1e;
      text-shadow: 1px 2px 0 #d4a96a;
      margin-bottom: 16px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .description {
      background: rgba(255,255,255,0.75);
      border: 2px dashed #c8a26a;
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 36px;
      color: #5c3d1e;
      line-height: 1.8;
      font-size: 1rem;
      animation: popIn 0.7s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 砂場キャンバス */
    .sandbox-area {
      background: #e8c98a;
      border-radius: 20px;
      border: 4px solid #b8864e;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2), inset 0 2px 8px rgba(255,255,255,0.4);
      padding: 24px;
      margin-bottom: 28px;
      animation: popIn 0.7s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    canvas {
      display: block;
      border-radius: 12px;
      cursor: crosshair;
      touch-action: none;
      background: #deb87a;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.15);
    }

    .sandbox-hint {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #7a5533;
    }

    .key-hints {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .key-hint {
      background: rgba(255,255,255,0.6);
      border: 1px solid #b8864e;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.78rem;
      color: #5c3d1e;
    }
    .key-hint kbd {
      background: #5c3d1e;
      color: #f5deb3;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.75rem;
      font-family: monospace;
    }

    /* ボタン群 */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
      animation: popIn 0.7s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
    .btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

    .btn-clear  { background: #ff8a65; color: white; }
    .btn-bucket { background: #42a5f5; color: white; }
    .btn-shovel { background: #66bb6a; color: white; }
    .btn-castle { background: #ab47bc; color: white; }

    .btn.active { outline: 3px solid white; outline-offset: 2px; }

    /* 砂の粒子数カウンター */
    .stats {
      font-size: 0.85rem;
      color: #7a5533;
      margin-top: 8px;
    }

    /* お城ポップアップ */
    #castle-msg {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      border: 3px solid #ab47bc;
      border-radius: 20px;
      padding: 30px 40px;
      font-size: 2rem;
      z-index: 100;
      animation: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    #castle-msg.show {
      display: block;
      animation: castlePop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes castlePop {
      from { transform: translate(-50%, -50%) scale(0); }
      to   { transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>

  <div class="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <div class="container">
    <h1>🏖️ 砂場へようこそ</h1>

    <div class="description">
      ここはあなただけの <strong>砂場（サンドボックス）</strong> です。<br>
      砂遊びをするかのように、自由に・気ままに楽しんでね。<br>
      難しいことは考えなくて大丈夫。ただ遊ぶだけでいい。🌟
    </div>

    <div class="sandbox-area">
      <canvas id="sandCanvas" width="560" height="320"></canvas>
      <div class="sandbox-hint">ドラッグして砂を盛ろう ✋　／　矢印キーでも操作できるよ ⌨️</div>
      <div class="key-hints">
        <span class="key-hint"><kbd>↑↓←→</kbd> カーソル移動＆砂を盛る</span>
        <span class="key-hint"><kbd>Space</kbd> その場に砂を置く</span>
        <span class="key-hint"><kbd>Shift</kbd>+<kbd>↑↓←→</kbd> 砂を飛ばす</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-shovel active" id="btn-draw" onclick="setTool('draw')">🪣 砂を盛る</button>
      <button class="btn btn-bucket" id="btn-erase" onclick="setTool('erase')">💨 砂を飛ばす</button>
      <button class="btn btn-castle" id="btn-castle" onclick="buildCastle()">🏰 お城を建てる</button>
      <button class="btn btn-clear" onclick="clearSand()">🗑️ 全部崩す</button>
    </div>
    <div class="stats" id="stats">砂の量: 0 粒</div>
  </div>

  <div id="castle-msg">🏰 すごい！お城が完成！</div>

  <script>
    const canvas = document.getElementById('sandCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // セル単位の砂グリッド
    const CELL = 4;
    const COLS = W / CELL;
    const ROWS = H / CELL;
    const grid = new Uint8Array(COLS * ROWS); // 0=空, 1=砂

    let tool = 'draw';
    let drawing = false;
    let px = -1, py = -1;
    let frame = 0;

    // キーボードカーソル
    const cursor = { c: Math.floor(COLS / 2), r: Math.floor(ROWS / 2) };
    const keys = {};
    let keyMoveTimer = 0;
    const KEY_REPEAT_DELAY = 6; // フレーム数

    function idx(c, r) { return r * COLS + c; }

    function setTool(t) {
      tool = t;
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + t).classList.add('active');
    }

    function clearSand() {
      grid.fill(0);
      draw();
    }

    function buildCastle() {
      // 簡単なお城パターンを描く
      const cx = Math.floor(COLS / 2);
      const base = ROWS - 2;
      // 土台
      for (let c = cx - 12; c <= cx + 12; c++)
        for (let r = base - 4; r <= base; r++)
          if (c >= 0 && c < COLS && r >= 0) grid[idx(c, r)] = 1;
      // 塔
      for (let c = cx - 8; c <= cx - 5; c++)
        for (let r = base - 10; r <= base - 4; r++)
          if (r >= 0) grid[idx(c, r)] = 1;
      for (let c = cx + 5; c <= cx + 8; c++)
        for (let r = base - 10; r <= base - 4; r++)
          if (r >= 0) grid[idx(c, r)] = 1;
      for (let c = cx - 3; c <= cx + 3; c++)
        for (let r = base - 13; r <= base - 4; r++)
          if (r >= 0) grid[idx(c, r)] = 1;
      // 城壁の凸凹
      [[cx-8,base-11],[cx-6,base-11],[cx-1,base-14],[cx+1,base-14],[cx+5,base-11],[cx+7,base-11]].forEach(([c,r]) => {
        if (r >= 0 && c >= 0 && c < COLS) grid[idx(c, r)] = 1;
      });
      draw();
      // ポップアップ
      const msg = document.getElementById('castle-msg');
      msg.classList.remove('show');
      void msg.offsetWidth;
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2200);
    }

    // 砂の落下シミュレーション
    function simulate() {
      // 下から上へ処理
      for (let r = ROWS - 2; r >= 0; r--) {
        for (let c = 0; c < COLS; c++) {
          if (!grid[idx(c, r)]) continue;
          if (r + 1 < ROWS && !grid[idx(c, r + 1)]) {
            grid[idx(c, r + 1)] = 1;
            grid[idx(c, r)] = 0;
          } else {
            const dir = Math.random() < 0.5 ? -1 : 1;
            const nc = c + dir;
            if (nc >= 0 && nc < COLS && r + 1 < ROWS && !grid[idx(nc, r + 1)]) {
              grid[idx(nc, r + 1)] = 1;
              grid[idx(c, r)] = 0;
            } else {
              const nc2 = c - dir;
              if (nc2 >= 0 && nc2 < COLS && r + 1 < ROWS && !grid[idx(nc2, r + 1)]) {
                grid[idx(nc2, r + 1)] = 1;
                grid[idx(c, r)] = 0;
              }
            }
          }
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      let count = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[idx(c, r)]) {
            const shade = 160 + Math.floor(Math.random() * 30);
            ctx.fillStyle = `rgb(${shade + 50}, ${shade + 20}, ${shade - 30})`;
            ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
            count++;
          }
        }
      }
      // カーソル描画
      const cx = cursor.c * CELL + CELL / 2;
      const cy = cursor.r * CELL + CELL / 2;
      const r = (keys['Shift'] ? 5 : 3) * CELL + 2;
      ctx.save();
      ctx.strokeStyle = keys['Shift'] ? 'rgba(100,180,255,0.9)' : 'rgba(255,220,80,0.9)';
      ctx.lineWidth = 2;
      ctx.shadowColor = keys['Shift'] ? '#42a5f5' : '#ffcc00';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();
      // 十字線
      ctx.beginPath();
      ctx.moveTo(cx - r - 4, cy); ctx.lineTo(cx + r + 4, cy);
      ctx.moveTo(cx, cy - r - 4); ctx.lineTo(cx, cy + r + 4);
      ctx.stroke();
      ctx.restore();
      document.getElementById('stats').textContent = `砂の量: ${count * CELL * CELL} 粒`;
    }

    function applyBrush(x, y) {
      const cc = Math.floor(x / CELL);
      const rr = Math.floor(y / CELL);
      const radius = tool === 'erase' ? 5 : 3;
      for (let dr = -radius; dr <= radius; dr++) {
        for (let dc = -radius; dc <= radius; dc++) {
          if (dc * dc + dr * dr > radius * radius) continue;
          const nc = cc + dc, nr = rr + dr;
          if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
          grid[idx(nc, nr)] = tool === 'erase' ? 0 : 1;
        }
      }
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
    }

    canvas.addEventListener('mousedown',  e => { drawing = true; const p = getPos(e); applyBrush(p.x, p.y); });
    canvas.addEventListener('mousemove',  e => { if (!drawing) return; const p = getPos(e); applyBrush(p.x, p.y); });
    canvas.addEventListener('mouseup',    () => drawing = false);
    canvas.addEventListener('mouseleave', () => drawing = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); applyBrush(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); applyBrush(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchend',   () => drawing = false);

    // キーボード操作
    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      keys[e.key] = true;
      // スペースでその場に塗る
      if (e.key === ' ') {
        e.preventDefault();
        const prevTool = tool;
        if (keys['Shift']) tool = 'erase';
        applyBrush(cursor.c * CELL, cursor.r * CELL);
        tool = prevTool;
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function handleKeyMove() {
      const arrows = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
      if (!arrows.some(k => keys[k])) { keyMoveTimer = 0; return; }

      keyMoveTimer++;
      // 最初のフレームか、一定フレーム経過後に移動（キーリピート）
      if (keyMoveTimer !== 1 && keyMoveTimer % KEY_REPEAT_DELAY !== 0) return;

      if (keys['ArrowLeft'])  cursor.c = Math.max(0, cursor.c - 1);
      if (keys['ArrowRight']) cursor.c = Math.min(COLS - 1, cursor.c + 1);
      if (keys['ArrowUp'])    cursor.r = Math.max(0, cursor.r - 1);
      if (keys['ArrowDown'])  cursor.r = Math.min(ROWS - 1, cursor.r + 1);

      const prevTool = tool;
      if (keys['Shift']) tool = 'erase';
      applyBrush(cursor.c * CELL, cursor.r * CELL);
      tool = prevTool;
    }

    // アニメーションループ
    (function loop() {
      frame++;
      handleKeyMove();
      if (frame % 2 === 0) simulate();
      draw();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
